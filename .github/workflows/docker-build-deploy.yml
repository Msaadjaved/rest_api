name: Docker Build, Publish and Deploy to EC2

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./API
          file: ./API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: $ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with image tag
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const imageName = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}';
            const prTag = 'pr-${{ github.event.pull_request.number }}';
            const body = `✅ Docker image built and published!\n\nPull command:\n\`\`\`\ndocker pull ${imageName}:${prTag}\n\`\`\`\n\nDeploying to EC2 for testing...`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: success() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'main'))

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Set variables
            IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            
            # Determine which tag to use
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              TAG="pr-$PR_NUMBER"
              echo "🚀 Deploying PR #$PR_NUMBER for testing"
            else
              TAG="latest"
              echo "🚀 Deploying latest main branch to production"
            fi
            
            FULL_IMAGE="${IMAGE_NAME}:${TAG}"
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the image
            docker pull $FULL_IMAGE
            
            # Stop and remove old container
            docker stop rest-api || true
            docker rm rest-api || true
            
            # Create .env file
            mkdir -p ~/rest_api
            cd ~/rest_api
            
            cat > .env << EOF
            PORT=3000
            NODE_ENV=production
            DATABASE_URL=./database.sqlite
            API_KEY=${{ secrets.API_KEY }}
            EOF
            
            # Run new container
            docker run -d \
              --name rest-api \
              --restart unless-stopped \
              -p 80:3000 \
              -v ~/rest_api/.env:/usr/src/app/.env \
              -v ~/rest_api/database.sqlite:/usr/src/app/database.sqlite \
              $FULL_IMAGE
            
            # Check if running
            if docker ps | grep -q rest-api; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Deployment failed"
              docker logs rest-api
              exit 1
            fi

      - name: Comment PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ec2Host = '${{ secrets.EC2_HOST }}';
            const body = `🚀 **PR deployed to EC2 test environment!**\n\nAccess your application at: http://${ec2Host}\n\n*This is a temporary deployment for testing PR #${{ github.event.pull_request.number }}.*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });