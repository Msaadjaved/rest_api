name: Docker Build, Publish and Deploy to Render

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with image details
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const imageName = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}';
            const prTag = 'pr-${{ github.event.pull_request.number }}';
            const body = `## ✅ Docker Image Built Successfully!
            
            **Image Details:**
            - 📦 Repository: \`${imageName}\`
            - 🏷️ Tag: \`${prTag}\`
            
            **Pull Command:**
            \`\`\`bash
            docker pull ${imageName}:${prTag}
            \`\`\`
            
            **Next Steps:**
            1. Merge this PR to deploy to Render
            2. Your app will be live at: https://rest-api.onrender.com
            
            **Your API Endpoints:**
            - Frontend: https://rest-api.onrender.com
            - Health Check: https://rest-api.onrender.com/api/health
            - API Docs: https://rest-api.onrender.com/api
            - Users API: https://rest-api.onrender.com/api/users (requires API key)`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });